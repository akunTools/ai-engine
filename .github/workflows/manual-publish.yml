name: Manual Publish

on:
  workflow_dispatch:
    inputs:
      task_type:
        description: 'article or tool'
        required: true
        default: 'article'

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install Pillow
        run: pip install Pillow
      - name: Run pipeline
        env:
          BRAIN_PAT: ${{ secrets.BRAIN_PAT }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ENGINE_REPO: ${{ github.repository }}
          BRAIN_REPO: akunTools/ai-brain
          WORKER_URL: ${{ secrets.WORKER_URL }}
          BRIEF_TOKEN: ${{ secrets.BRIEF_TOKEN }}
          SITE_BASE_URL: ${{ vars.SITE_BASE_URL }}
          TASK_TYPE: ${{ github.event.inputs.task_type }}
        run: python scripts/run_pipeline.py
