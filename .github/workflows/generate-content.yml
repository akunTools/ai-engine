name: Generate Content

on:
  schedule:
    # Artikel: setiap 2 hari, jam 8 pagi UTC
    - cron: '0 8 */2 * *'
    # Tools: setiap 14 hari, jam 9 pagi UTC
    - cron: '0 9 */14 * *'
  workflow_dispatch:
    inputs:
      task_type:
        description: 'Jenis konten: article atau calculator_tool'
        required: true
        default: 'article'

jobs:
  publish-content:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout ai-engine
        uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Tentukan task_type
        id: tasktype
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "type=${{ github.event.inputs.task_type }}" >> $GITHUB_OUTPUT
          elif [ "${{ github.event.schedule }}" = "0 9 */14 * *" ]; then
            echo "type=calculator_tool" >> $GITHUB_OUTPUT
          else
            echo "type=article" >> $GITHUB_OUTPUT
          fi

      - name: Jalankan Pipeline
        env:
          BRAIN_PAT:   ${{ secrets.BRAIN_PAT }}
          BRAIN_REPO:  akunTools/ai-brain
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ENGINE_REPO:  ${{ github.repository }}
          SITE_BASE_URL: https://saas.blogtrick.eu.org
          TASK_TYPE:   ${{ steps.tasktype.outputs.type }}
        run: python scripts/run_pipeline.py

      - name: Kirim email berhasil
        if: success() && hashFiles('/tmp/queue_empty.flag') == ''
        uses: dawidd6/action-send-mail@v4
        with:
          server_address: smtp-relay.brevo.com
          server_port: 587
          secure: false
          username: ${{ secrets.BREVO_USERNAME }}
          password: ${{ secrets.BREVO_PASSWORD }}
          subject: '[AI Engine] Published: ${{ steps.tasktype.outputs.type }}'
          to: ${{ secrets.NOTIFICATION_EMAIL }}
          from: AI Engine <${{ secrets.GMAIL_USERNAME }}>
          body: |
            Content published successfully.

            Type    : ${{ steps.tasktype.outputs.type }}
            Run ID  : ${{ github.run_id }}

            View site: https://saas.blogtrick.eu.org
            View run : https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}

      - name: Kirim email staging kosong
        if: success() && hashFiles('/tmp/queue_empty.flag') != ''
        uses: dawidd6/action-send-mail@v4
        with:
          server_address: smtp-relay.brevo.com
          server_port: 587
          secure: false
          username: ${{ secrets.BREVO_USERNAME }}
          password: ${{ secrets.BREVO_PASSWORD }}
          subject: '[AI Engine] Staging Empty — Action Required'
          to: ${{ secrets.NOTIFICATION_EMAIL }}
          from: AI Engine <${{ secrets.GMAIL_USERNAME }}>
          body: |
            Staging folder is empty. No content to publish.

            Type checked: ${{ steps.tasktype.outputs.type }}

            ACTION REQUIRED:
            Write new content with Claude and save to staging/
            in the ai-brain repository.

      - name: Kirim email gagal
        if: failure()
        uses: dawidd6/action-send-mail@v4
        with:
          server_address: smtp-relay.brevo.com
          server_port: 587
          secure: false
          username: ${{ secrets.BREVO_USERNAME }}
          password: ${{ secrets.BREVO_PASSWORD }}
          subject: '[AI Engine] Publish Failed'
          to: ${{ secrets.NOTIFICATION_EMAIL }}
          from: AI Engine <${{ secrets.GMAIL_USERNAME }}>
          body: |
            Pipeline failed during publish.

            Type   : ${{ steps.tasktype.outputs.type }}
            Run ID : ${{ github.run_id }}

            Check Actions tab:
            https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
