name: Cross-Post to Dev.to and Hashnode

on:
  push:
    branches:
      - output
    paths:
      - 'articles/**.html'   # hanya artikel, bukan tools

jobs:
  cross_post:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write

    steps:
      - name: Checkout scripts (main branch)
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install html2text
        run: pip install html2text --quiet

      - name: Detect published article
        id: detect
        uses: actions/github-script@v7
        with:
          script: |
            const added = context.payload.head_commit?.added || [];
            console.log('Files added:', JSON.stringify(added));

            for (const f of added) {
              const m = f.match(/^articles\/(.+)\.html$/);
              if (!m) continue;

              // Output branch tidak pakai date prefix
              const slug = m[1];
              core.setOutput('slug', slug);
              core.setOutput('skip', 'false');
              console.log(`Detected article: ${slug}`);
              return;
            }

            core.setOutput('skip', 'true');
            console.log('No new article HTML in this push — skip');

      - name: Cross-post article
        if: steps.detect.outputs.skip != 'true'
        env:
          GITHUB_TOKEN:            ${{ secrets.GITHUB_TOKEN }}
          ENGINE_REPO:             ${{ github.repository }}
          SITE_BASE_URL:           ${{ vars.SITE_BASE_URL }}
          DEV_TO_API_KEY:          ${{ secrets.DEV_TO_API_KEY }}
          HASHNODE_API_KEY:        ${{ secrets.HASHNODE_API_KEY }}
          HASHNODE_PUBLICATION_ID: ${{ secrets.HASHNODE_PUBLICATION_ID }}
        run: |
          python scripts/cross_post.py \
            articles \
            "${{ steps.detect.outputs.slug }}"

      - name: Email alert on failure
        if: failure()
        uses: dawidd6/action-send-mail@v4
        with:
          server_address: smtp-relay.brevo.com
          server_port:    587
          username:       ${{ secrets.BREVO_USERNAME }}
          password:       ${{ secrets.BREVO_PASSWORD }}
          subject:        "[AI Engine] Cross-post failed: ${{ steps.detect.outputs.slug }}"
          to:             ${{ secrets.NOTIFY_EMAIL }}
          from:           ${{ secrets.BREVO_FROM_EMAIL }}
          body: |
            Cross-post gagal untuk artikel:
            Slug: ${{ steps.detect.outputs.slug }}
            Cek GitHub Actions log untuk detail.
