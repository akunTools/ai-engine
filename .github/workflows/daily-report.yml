name: Daily Report

on:
  workflow_dispatch:
  schedule:
    # Setiap hari jam 06:00 UTC (13:00 WIB)
    - cron: '0 6 * * *'

jobs:
  report:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Jalankan Reporter
        env:
          BRAIN_PAT:        ${{ secrets.BRAIN_PAT }}
          BRAIN_REPO:       akunTools/ai-brain
          ENGINE_REPO:      ${{ github.repository }}
          GITHUB_TOKEN:     ${{ secrets.GITHUB_TOKEN }}
          BREVO_USERNAME:   ${{ secrets.BREVO_USERNAME }}
          BREVO_PASSWORD:   ${{ secrets.BREVO_PASSWORD }}
          BREVO_FROM_EMAIL: ${{ secrets.BREVO_FROM_EMAIL }}
          NOTIFY_EMAIL:     ${{ secrets.NOTIFY_EMAIL }}
        run: python scripts/reporter.py
