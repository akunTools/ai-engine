<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>All Articles — blogtrick</title>
  <meta name="description" content="No-fluff guides for bootstrapped SaaS founders. 1 articles covering pricing, metrics, ops, and growth.">
  <link rel="canonical" href="https://saas.blogtrick.eu.org/articles/">
  <link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin><link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&display=swap" rel="stylesheet">
  <style>

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg:           #f7f6f3;
    --surface:      #ffffff;
    --text:         #18181b;
    --muted:        #71717a;
    --subtle:       #a1a1aa;
    --border:       #e4e4e7;
    --accent:       #4f46e5;
    --accent-h:     #4338ca;
    --accent-light: #eef2ff;
    --danger:       #ef4444;
    --danger-bg:    #fef2f2;
    --warning:      #f59e0b;
    --warning-bg:   #fffbeb;
    --success:      #10b981;
    --success-bg:   #f0fdf4;
    --r:            10px;
    --shadow:       0 1px 3px rgba(0,0,0,.07), 0 1px 2px rgba(0,0,0,.04);
    --shadow-md:    0 4px 16px rgba(0,0,0,.08);
  }
  body {
    font-family: 'DM Sans', -apple-system, BlinkMacSystemFont, sans-serif;
    background: var(--bg);
    color: var(--text);
    line-height: 1.6;
    -webkit-font-smoothing: antialiased;
  }
  a { color: var(--accent); text-decoration: none; }
  a:hover { color: var(--accent-h); }


  nav {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 0 20px;
    position: sticky;
    top: 0;
    z-index: 100;
  }
  .nav-inner {
    max-width: 720px;
    margin: 0 auto;
    height: 56px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .nav-brand {
    font-size: 1rem;
    font-weight: 700;
    color: var(--text);
    text-decoration: none;
    letter-spacing: -.02em;
    display: flex;
    align-items: center;
    gap: 2px;
  }
  .brand-accent { color: var(--accent); }
  .nav-links { display: flex; gap: 2px; }
  .nav-links a {
    font-size: .875rem;
    font-weight: 500;
    color: var(--muted);
    text-decoration: none;
    padding: 6px 14px;
    border-radius: 8px;
    transition: all .15s;
  }
  .nav-links a:hover { color: var(--text); background: var(--bg); }
  .nav-links a.active { color: var(--accent); background: var(--accent-light); }


    /* ── Layout ─────────────────────────────────────── */
    .page-wrap {
      max-width: 720px;
      margin: 0 auto;
      padding: 0 1.25rem;
    }

    /* ── Page Header ────────────────────────────────── */
    .page-header {
      padding: 3.5rem 0 2.25rem;
      border-bottom: 1px solid var(--border);
    }

    .page-header__title {
      font-size: clamp(1.5rem, 4vw, 2.125rem);
      font-weight: 700;
      letter-spacing: -0.02em;
      color: var(--text);
      margin-bottom: 0.5rem;
      line-height: 1.2;
    }

    .page-header__meta {
      font-size: 0.9rem;
      color: var(--muted);
    }

    .page-header__meta strong {
      color: var(--text);
      font-weight: 600;
    }

    /* ── Article List ───────────────────────────────── */
    .article-list {
      padding: 0.5rem 0 3rem;
      display: flex;
      flex-direction: column;
    }

    .article-list .article-item {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      gap: 1rem;
      padding: 1.0625rem 0;
      border-bottom: 1px solid var(--border);
      text-decoration: none;
      color: inherit;
      position: relative;
      transition: padding-left 0.18s ease;
    }

    .article-list .article-item::before {
      content: '';
      position: absolute;
      left: -0.875rem;
      top: 50%;
      transform: translateY(-50%);
      width: 3px;
      height: 0;
      background: var(--accent);
      border-radius: 2px;
      transition: height 0.18s ease;
    }

    .article-list .article-item:last-child {
      border-bottom: none;
    }

    .article-item__left {
      min-width: 0;
      flex: 1;
    }

    .article-item__title {
      display: block;
      font-size: 0.9375rem;
      font-weight: 500;
      color: var(--text);
      line-height: 1.4;
      margin-bottom: 0.25rem;
      transition: color 0.13s ease;
    }

    .article-item__desc {
      display: block;
      font-size: 0.8125rem;
      color: var(--muted);
      line-height: 1.5;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .article-item__date {
      font-size: 0.8125rem;
      color: var(--subtle);
      white-space: nowrap;
      flex-shrink: 0;
    }

    @media (hover: hover) {
      .article-list .article-item:hover {
        padding-left: 0.5625rem;
      }

      .article-list .article-item:hover::before {
        height: 50%;
      }

      .article-list .article-item:hover .article-item__title {
        color: var(--accent);
      }
    }

    .empty {
      text-align: center;
      color: var(--muted);
      font-size: 0.9rem;
      padding: 3rem 0;
    }


  footer {
    border-top: 1px solid var(--border);
    background: var(--surface);
    padding: 32px 20px;
  }
  .footer-inner { max-width: 720px; margin: 0 auto; }
  .footer-top {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 20px;
  }
  .footer-brand {
    font-size: .95rem;
    font-weight: 700;
    color: var(--text);
    text-decoration: none;
    letter-spacing: -.02em;
  }
  .footer-accent { color: var(--accent); }
  .footer-nav { display: flex; gap: 24px; }
  .footer-nav a {
    font-size: .8rem;
    color: var(--muted);
    text-decoration: none;
    transition: color .15s;
  }
  .footer-nav a:hover { color: var(--accent); }
  .footer-bottom {
    font-size: .75rem;
    color: var(--subtle);
    border-top: 1px solid var(--border);
    padding-top: 16px;
  }


    /* ── Responsive ─────────────────────────────────── */
    @media (max-width: 600px) {
      .page-header {
        padding: 2.5rem 0 1.75rem;
      }

      .article-list .article-item {
        align-items: flex-start;
        flex-wrap: wrap;
        gap: 0.25rem;
      }

      .article-item__desc {
        white-space: normal;
        overflow: visible;
        text-overflow: unset;
      }

      .article-item__date {
        width: 100%;
        font-size: 0.75rem;
      }
    }
  </style>
</head>
<body>

<nav>
  <div class="nav-inner">
    <a href="/" class="nav-brand">
      SaaS<span class="brand-accent">Tools</span>
    </a>
    <div class="nav-links">
      <a href="/articles/" class="active">Articles</a>
      <a href="/tools/">Tools</a>
    </div>
  </div>
</nav>

<main class="page-wrap">

  <header class="page-header">
    <h1 class="page-header__title">Articles</h1>
    <p class="page-header__meta">
      <strong>1</strong> articles — practical writing for founders
      who would rather read once and decide than read ten posts and stay confused.
    </p>
  </header>

  <div class="article-list">
    
      <a href="https://saas.blogtrick.eu.org/articles/test-pipeline" class="article-item">
        <div class="article-item__left">
          <span class="article-item__title">Test Pipeline</span>
        </div>
        
      </a>
  </div>

</main>

<footer>
  <div class="footer-inner">
    <div class="footer-top">
      <a href="/" class="footer-brand">SaaS<span class="footer-accent">Tools</span></a>
      <nav class="footer-nav">
        <a href="/articles/">Articles</a>
        <a href="/tools/">Tools</a>
      </nav>
    </div>
    <div class="footer-bottom">
      Free calculators and guides for bootstrapped founders.
    </div>
  </div>
</footer>

</body>
</html>
