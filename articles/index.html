  <style>

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg:           #f7f6f3;
    --surface:      #ffffff;
    --text:         #18181b;
    --muted:        #71717a;
    --subtle:       #a1a1aa;
    --border:       #e4e4e7;
    --accent:       #4f46e5;
    --accent-h:     #4338ca;
    --accent-light: #eef2ff;
    --danger:       #ef4444;
    --danger-bg:    #fef2f2;
    --warning:      #f59e0b;
    --warning-bg:   #fffbeb;
    --success:      #10b981;
    --success-bg:   #f0fdf4;
    --r:            10px;
    --shadow:       0 1px 3px rgba(0,0,0,.07), 0 1px 2px rgba(0,0,0,.04);
    --shadow-md:    0 4px 16px rgba(0,0,0,.08);
  }
  body {
    font-family: 'DM Sans', -apple-system, BlinkMacSystemFont, sans-serif;
    background: var(--bg);
    color: var(--text);
    line-height: 1.6;
    -webkit-font-smoothing: antialiased;
  }
  a { color: var(--accent); text-decoration: none; }
  a:hover { color: var(--accent-h); }


nav {
  position: sticky;
  top: 0;
  z-index: 100;
  background: var(--surface);
  border-bottom: 1px solid var(--border);
}

.nav-inner {
  max-width: 1120px;
  margin: 0 auto;
  padding: 0 24px;
  height: 56px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 16px;
}

.nav-brand {
  font-family: 'DM Sans', sans-serif;
  font-weight: 700;
  font-size: 1.125rem;
  letter-spacing: -0.025em;
  color: var(--text);
  text-decoration: none;
  display: inline-flex;
  align-items: center;
  min-height: 44px;
  white-space: nowrap;
  flex-shrink: 0;
}

.brand-accent {
  color: var(--accent);
}

.nav-links {
  display: flex;
  align-items: center;
  gap: 2px;
}

.nav-links a {
  font-size: 0.875rem;
  font-weight: 500;
  color: var(--muted);
  text-decoration: none;
  padding: 0 12px;
  min-height: 44px;
  display: inline-flex;
  align-items: center;
  border-radius: 6px;
  transition: color 0.15s ease, background 0.15s ease;
}

.nav-links a:hover {
  color: var(--text);
  background: var(--accent-light);
}

.nav-links a.active {
  color: var(--accent);
  background: var(--accent-light);
}

.nav-back {
  font-size: 0.875rem;
  font-weight: 500;
  color: var(--muted);
  text-decoration: none;
  display: inline-flex;
  align-items: center;
  gap: 6px;
  min-height: 44px;
  padding: 0 6px;
  border-radius: 6px;
  transition: color 0.15s ease;
}

.nav-back:hover {
  color: var(--text);
}

@media (max-width: 640px) {
  .nav-inner {
    padding: 0 16px;
  }

  .nav-links a {
    padding: 0 8px;
    font-size: 0.8125rem;
  }
}


footer {
  background: var(--surface);
  border-top: 1px solid var(--border);

}

.footer-inner {

}

}

.footer-brand {
  font-family: 'DM Sans', sans-serif;

  font-size: 1.0625rem;
  letter-spacing: -0.02em;

  text-decoration: none;

  white-space: nowrap;
}

.footer-accent {

}

.footer-nav {

}

.footer-nav a {
  font-size: 0.875rem;
  font-weight: 500;
  color: var(--muted);
  text-decoration: none;
  padding: 0 10px;
  min-height: 44px;
  display: inline-flex;
  align-items: center;
  border-radius: 6px;
  transition: color 0.15s ease;
}

.footer-nav a:hover {
  color: var(--text);
}

.footer-bottom {
  margin-top: 24px;
  padding-top: 24px;
  border-top: 1px solid var(--border);
  font-size: 0.8125rem;
  color: var(--subtle);
  line-height: 1.55;
}

@media (max-width: 640px) {
  footer {
    margin-top: 56px;
  }

  .footer-inner {
    padding: 32px 16px;
  }

  .footer-top {
    flex-direction: column;
    align-items: flex-start;
    gap: 8px;
  }
}


.home-wrap {
  max-width: 760px;

}

.hero {

}

.hero__eyebrow {

  font-size: 0.6875rem;
  font-weight: 600;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--accent);
  margin-bottom: 14px;
}

.hero h1 {
  font-size: 2.5rem;
  font-weight: 700;
  letter-spacing: -0.035em;
  line-height: 1.15;
  color: var(--text);
  margin: 0 0 18px;
}

.hero p {
  font-size: 1.0625rem;
  color: var(--muted);
  line-height: 1.75;
  margin: 0;
  max-width: 540px;
}

.home-section {
  padding: 56px 0 0;
}

.section-header {
  display: flex;
  align-items: flex-end;
  justify-content: space-between;
  gap: 16px;
  margin-bottom: 0;
}

.section-header__meta {
  display: flex;
  flex-direction: column;
  gap: 4px;
}

.section-label {
  font-size: 0.6875rem;
  font-weight: 600;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--accent);
}

.section-title {
  font-size: 1.0625rem;
  font-weight: 700;
  letter-spacing: -0.02em;
  color: var(--text);
  margin: 0;
  line-height: 1.3;
}

.section-see-all {
  font-size: 0.8125rem;
  font-weight: 500;
  color: var(--accent);
  text-decoration: none;
  white-space: nowrap;
  display: inline-flex;
  align-items: center;
  gap: 4px;
  min-height: 44px;
  padding: 0 2px;
  transition: color 0.15s ease;
}

.section-see-all:hover {
  color: var(--accent-h);
}

.article-list {
  display: flex;
  flex-direction: column;
  margin-top: 24px;
  border-top: 1px solid var(--border);
}

.article-item {
  display: flex;
  flex-direction: row;
  align-items: flex-start;
  gap: 24px;
  padding: 18px 0;
  border-bottom: 1px solid var(--border);
  text-decoration: none;
  color: inherit;
  min-height: 44px;
}

.article-item:hover .article-item__title {
  color: var(--accent);
}

.article-item__left {
  display: flex;
  flex-direction: column;
  gap: 5px;
  flex: 1;
  min-width: 0;
}

.article-item__title {
  font-size: 0.9375rem;
  font-weight: 500;
  color: var(--text);
  line-height: 1.45;
  transition: color 0.12s ease;
}

.article-item__excerpt {
  font-size: 0.875rem;
  color: var(--muted);
  line-height: 1.5;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.article-item__date {
  font-size: 0.8125rem;
  color: var(--subtle);
  white-space: nowrap;
  flex-shrink: 0;
  padding-top: 2px;
  font-variant-numeric: tabular-nums;
}

.tools-grid {
  display: grid;
  gap: 16px;
  grid-template-columns: 1fr;
  margin-top: 24px;
}

.tool-card {
  display: flex;
  flex-direction: column;
  gap: 10px;
  padding: 20px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--r);
  text-decoration: none;
  color: inherit;
  box-shadow: var(--shadow);
  min-height: 44px;
  transition: box-shadow 0.15s ease, border-color 0.15s ease, transform 0.12s ease;
}

.tool-card:hover {
  box-shadow: var(--shadow-md);
  border-color: var(--accent);
  transform: translateY(-1px);
}

.tool-card__icon {
  font-size: 1.5rem;
  line-height: 1;
}

.tool-card__name {
  font-size: 0.9375rem;
  font-weight: 600;
  color: var(--text);
  letter-spacing: -0.01em;
  line-height: 1.3;
}

.tool-card__desc {
  font-size: 0.8125rem;
  color: var(--muted);
  line-height: 1.6;
}

.hosting-nudge {
  margin-top: 56px;
  padding: 24px;
  background: var(--accent-light);
  border: 1px solid var(--border);
  border-radius: var(--r);
  display: flex;
  align-items: center;
  gap: 20px;
}

.hosting-nudge__text {
  flex: 1;
  font-size: 0.9375rem;
  color: var(--text);
  line-height: 1.65;
  min-width: 0;
}

.hosting-nudge__text strong {
  color: var(--accent);
  font-weight: 600;
}

.hosting-nudge__link {
  font-size: 0.875rem;
  font-weight: 600;
  color: var(--surface);
  background: var(--accent);
  text-decoration: none;
  padding: 0 18px;
  min-height: 44px;
  display: inline-flex;
  align-items: center;
  border-radius: 6px;
  white-space: nowrap;
  flex-shrink: 0;
  transition: background 0.15s ease;
}

.hosting-nudge__link:hover {
  background: var(--accent-h);
}

.empty-note {
  font-size: 0.9rem;
  color: var(--muted);
  padding: 24px 0;
}

@media (max-width: 640px) {
  .home-wrap {
    padding: 0 16px;
  }

  .hero {
    padding: 48px 0 40px;
  }

  .hero h1 {
    font-size: 1.875rem;
  }

  .hero p {
    font-size: 1rem;
  }

  .home-section {
    padding: 40px 0 0;
  }

  .article-item {
    flex-direction: column;
    gap: 4px;
  }

  .article-item__date {
    font-size: 0.75rem;
    padding-top: 0;
    width: 100%;
  }

  .hosting-nudge {
    flex-direction: column;
    align-items: flex-start;
    gap: 14px;
  }

  .hosting-nudge__link {
    width: 100%;
    justify-content: center;
  }
}

@media (min-width: 600px) and (max-width: 899px) {
  .tools-grid {
    grid-template-columns: repeat(2, 1fr);
  }
}

@media (min-width: 900px) {
  .tools-grid {
    grid-template-columns: repeat(3, 1fr);
  }
}
